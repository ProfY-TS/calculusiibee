<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question 2</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            flex-direction: column;
            gap: 2rem;
        }
        .box {
            background: white;
            padding: 3rem 4rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .wrong {
            font-size: 2.5rem;
            color: #cc3333;
        }
        .emoji-big {
            font-size: 4rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        a {
            font-size: 1.1rem;
            color: #0066cc;
            text-decoration: none;
            border: 2px solid #0066cc;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 0.5rem;
        }
        a:hover {
            background-color: #0066cc;
            color: white;
        }
        .funny {
            font-size: 1rem;
            color: #888;
            margin-top: 1rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="box">
        <span class="emoji-big">🔎</span>
        <div class="wrong">Not this one either</div>
        <p style="color: #666;">This URL is about as useful as a screen door on a submarine.</p>
        <div class="funny">— Keep searching, detective.</div>
        <a href="index.html">← Go back</a>
    </div>
</body>
</html>
