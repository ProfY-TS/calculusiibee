<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question 4</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f8f0;
            flex-direction: column;
            gap: 2rem;
        }
        .box {
            background: white;
            padding: 3rem 4rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .correct {
            font-size: 2.5rem;
            color: #33aa33;
        }
        .emoji-big {
            font-size: 4rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .sub {
            font-size: 1.2rem;
            color: #666;
            margin-top: 0.5rem;
        }
        img {
            display: block;
            margin: 1rem auto;
            max-width: 200px;
            width: 100%;
            height: auto;
        }
        a {
            font-size: 1.1rem;
            color: #0066cc;
            text-decoration: none;
            border: 2px solid #0066cc;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 0.5rem;
        }
        a:hover {
            background-color: #0066cc;
            color: white;
        }
        .small-note {
            font-size: 0.9rem;
            color: #999;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="box">
        <span class="emoji-big">🎉</span>
        <div class="correct">Yes, this one!</div>
        <div class="sub">You found the correct path.</div>
        <p style="color: #666;">Scan the QR code below to reveal the final answer.</p>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://profy-ts.github.io/calculusiibee/real.html" alt="QR Code" />

        <div class="small-note"><a href="index.html" style="border: none; padding: 0; font-size: 0.9rem; color: #0066cc;">← Go back to start</a></div>
    </div>
</body>
</html>
